<!DOCTYPE html>
<html>
<head>
    <title>中和民眾黨支持度</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* 彈出視窗排版優化 */
        .leaflet-popup-content { font-size: 15px; line-height: 1.6; min-width: 200px; }
        .popup-title { font-size: 18px; color: #333; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .zone-tag { font-size: 13px; color: #666; font-weight: normal; }
        .highlight { color: #b30000; font-weight: bold; font-size: 16px; }
        .phone-link { color: #007bff; text-decoration: none; font-weight: bold; font-size: 16px; }
        .divider { margin: 8px 0; border: 0; border-top: 1px dashed #ccc; }

        /* 🔥 新增：地圖上直接顯示的里名標籤樣式 🔥 */
        .village-label {
            background: transparent; /* 背景透明 */
            border: none;            /* 取消邊框 */
            box-shadow: none;        /* 取消陰影 */
            font-size: 13px;         /* 字體大小 */
            font-weight: bold;       /* 粗體 */
            color: #222;             /* 字體顏色 (深灰黑) */
            /* 加上白色文字陰影，確保在深色背景上也看得清楚 */
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="zhonghe.js"></script>

<script>
    // 1. 初始化地圖
    var map = L.map('map').setView([24.9930, 121.4960], 14);

    // 2. 加入底圖
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 3. API 網址
    var apiUrl = 'https://script.google.com/macros/s/AKfycbzQOsa2wW0Cui7CxbmG6aLWqyahGLypxdKra6UGAgrNqztWmLuQ3gpaTLs1CwmSzs6kZQ/exec'; 

    // 4. 設定顏色邏輯
    function getColor(rate) {
        if (rate === undefined || rate === null || rate === "") return '#cccccc'; 
        var percent = rate * 100; 
        return percent >= 26 ? '#FF9999' : // 粉紅色
               percent >= 23 ? '#87CEFA' : // 天晴色
                               '#c7e9c0';  // 淺綠色
    }

    // 5. 抓取資料並渲染地圖
    fetch(apiUrl)
        .then(response => response.json())
        .then(supportData => {
            
            L.geoJSON(zhongheData, {
                style: function(feature) {
                    var villName = feature.properties.VILLNAME;
                    var info = supportData[villName];
                    var rate = info ? info.supportRate : null;
                    
                    return {
                        fillColor: getColor(rate),
                        weight: 1.5,
                        opacity: 1,
                        color: 'white',
                        fillOpacity: 0.8
                    };
                },
                onEachFeature: function (feature, layer) {
                    var villName = feature.properties.VILLNAME;
                    var info = supportData[villName];

                    // 🔥 新增：在區塊正中央永久顯示里名 🔥
                    layer.bindTooltip(villName, {
                        permanent: true,        // 永久顯示，不用等滑鼠滑過
                        direction: 'center',    // 對齊區塊正中央
                        className: 'village-label' // 套用我們上面寫好的 CSS 樣式
                    });

                    // 彈出視窗內容 (維持不變)
                    if (info) {
                        var rateText = info.supportRate ? (info.supportRate * 100).toFixed(2) + '%' : '無資料';
                        var supportCount = info.supportCount || 0;
                        var totalVotes = info.totalVotes || 0;
                        var chiefName = info.chiefName || '無資料';
                        var chiefGender = info.chiefGender || '';
                        var chiefPhone = info.chiefPhone || '無資料';
                        var zone = info.zone || '未設定分區';

                        var popupContent = `
                            <div class="popup-title">${villName} <span class="zone-tag">(${zone})</span></div>
                            <div><b>支持度：</b> <span class="highlight">${rateText}</span></div>
                            <div><b>支持人數：</b> ${supportCount} 人</div>
                            <div><b>總投票人數：</b> ${totalVotes} 人</div>
                            <hr class="divider">
                            <div><b>里長：</b> ${chiefName} ${chiefGender ? '('+chiefGender+')' : ''}</div>
                            <div><b>電話：</b> <a class="phone-link" href="tel:${chiefPhone}">${chiefPhone}</a></div>
                        `;
                        layer.bindPopup(popupContent);
                    } else {
                        layer.bindPopup(`<div class="popup-title">${villName}</div><div>尚未建立戰情資料</div>`);
                    }
                }
            }).addTo(map);
            
        })
        .catch(error => {
            console.error('API 讀取失敗:', error);
        });

</script>
</body>
</html>
