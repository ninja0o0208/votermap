<!DOCTYPE html>
<html>
<head>
    <title>中和民眾黨支持度</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        .leaflet-popup-content { font-size: 15px; line-height: 1.6; min-width: 200px; }
        .popup-title { font-size: 18px; color: #333; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        .zone-tag { font-size: 13px; color: #666; font-weight: normal; }
        .highlight { color: #b30000; font-weight: bold; font-size: 16px; }
        .phone-link { color: #007bff; text-decoration: none; font-weight: bold; font-size: 16px; }
        .divider { margin: 8px 0; border: 0; border-top: 1px dashed #ccc; }

        .village-label {
            background: transparent; 
            border: none;            
            box-shadow: none;        
            font-size: 13px;         
            font-weight: bold;       
            color: #222;             
            text-shadow: 1px 1px 2px white, -1px -1px 2px white, 1px -1px 2px white, -1px 1px 2px white; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script src="zhonghe.js"></script>

<script>
    // 1. 定義多種底圖
    var googleStreets = L.tileLayer('http://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: '© Google' });
    var googleSat = L.tileLayer('http://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: '© Google' });
    var cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20, attribution: '© CARTO' });
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' });

    // 2. 初始化地圖
    var map = L.map('map', {
        center: [24.9930, 121.4960],
        zoom: 14,
        layers: [googleStreets] 
    });

    var baseMaps = {
        "Google 街道圖": googleStreets,
        "簡約白底圖 (看數據推薦)": cartoLight,
        "Google 衛星圖": googleSat
    };

    // 這裡先宣告 layerControl，等一下抓完資料會把分區框線加進去
    var layerControl = L.control.layers(baseMaps).addTo(map);

    // 3. API 網址
    var apiUrl = 'https://script.google.com/macros/s/AKfycbzQOsa2wW0Cui7CxbmG6aLWqyahGLypxdKra6UGAgrNqztWmLuQ3gpaTLs1CwmSzs6kZQ/exec'; 

    // 4. 設定顏色邏輯
    function getColor(rate) {
        if (rate === undefined || rate === null || rate === "") return '#cccccc'; 
        var percent = rate * 100; 
        return percent >= 26 ? '#FF9999' : 
               percent >= 23 ? '#87CEFA' : 
                               '#c7e9c0';  
    }

    // 5. 抓取資料並渲染地圖
    fetch(apiUrl)
        .then(response => response.json())
        .then(supportData => {
            
            // 🔥 第一步：把 API 裡的「四大分區」屬性，寫入到 GeoJSON 裡面
            zhongheData.features.forEach(function(feature) {
                var villName = feature.properties.VILLNAME;
                var info = supportData[villName];
                // 如果該里有分區資料，就存成 ZONE 屬性；如果沒有，就歸類為 "未分類"
                feature.properties.ZONE = (info && info.zone && info.zone !== '#N/A') ? info.zone : '未分類';
            });

            // 第二步：畫出各個里的熱區顏色與彈出視窗 (原有的功能)
            var villagesLayer = L.geoJSON(zhongheData, {
                style: function(feature) {
                    var villName = feature.properties.VILLNAME;
                    var info = supportData[villName];
                    var rate = info ? info.supportRate : null;
                    
                    return {
                        fillColor: getColor(rate),
                        weight: 1,       // 裡的邊界線稍微變細
                        opacity: 0.8,
                        color: 'white',
                        fillOpacity: 0.8
                    };
                },
                onEachFeature: function (feature, layer) {
                    var villName = feature.properties.VILLNAME;
                    var info = supportData[villName];

                    layer.bindTooltip(villName, { permanent: true, direction: 'center', className: 'village-label' });

                    if (info) {
                        var rateText = info.supportRate ? (info.supportRate * 100).toFixed(2) + '%' : '無資料';
                        var supportCount = info.supportCount || 0;
                        var totalVotes = info.totalVotes || 0;
                        var chiefName = info.chiefName || '無資料';
                        var chiefGender = info.chiefGender || '';
                        var chiefPhone = info.chiefPhone || '無資料';
                        var zone = info.zone || '未設定分區';

                        var popupContent = `
                            <div class="popup-title">${villName} <span class="zone-tag">(${zone})</span></div>
                            <div><b>支持度：</b> <span class="highlight">${rateText}</span></div>
                            <div><b>支持人數：</b> ${supportCount} 人</div>
                            <div><b>總投票人數：</b> ${totalVotes} 人</div>
                            <hr class="divider">
                            <div><b>里長：</b> ${chiefName} ${chiefGender ? '('+chiefGender+')' : ''}</div>
                            <div><b>電話：</b> <a class="phone-link" href="tel:${chiefPhone}">${chiefPhone}</a></div>
                        `;
                        layer.bindPopup(popupContent);
                    } else {
                        layer.bindPopup(`<div class="popup-title">${villName}</div><div>尚未建立戰情資料</div>`);
                    }
                }
            }).addTo(map);

            // 🔥 第三步：使用 Turf.js 合併相同分區(ZONE)的多邊形 🔥
            var mergedZones = turf.dissolve(zhongheData, { propertyName: 'ZONE' });

            // 🔥 第四步：畫出合併後的四大分區外框 🔥
            var zoneBoundaryLayer = L.geoJSON(mergedZones, {
                style: function(feature) {
                    // 如果是沒有分類的里，就不要畫框線
                    if (feature.properties.ZONE === '未分類') return { opacity: 0 };
                    
                    return {
                        color: '#2c3e50',   // 框線顏色：深藍灰色
                        weight: 4,          // 框線加粗，明顯區分四大分區
                        opacity: 1,         // 框線不透明度
                        fillOpacity: 0,     // 絕對要設定為 0 (透明)！這樣才看得到底下各里的顏色
                        dashArray: '8, 8'   // 虛線效果，看起來更像行政區界線
                    };
                },
                // ⚠️ 關鍵設定：讓滑鼠游標「穿透」這個大外框，否則點不到底下的里名！
                interactive: false 
            }).addTo(map);

            // 將四大分區外框加入右上角的圖層控制器，讓團隊可以自由打勾/取消
            layerControl.addOverlay(zoneBoundaryLayer, "⬛ 顯示四大分區外框");
            
        })
        .catch(error => {
            console.error('API 讀取失敗:', error);
        });

</script>
</body>
</html>
